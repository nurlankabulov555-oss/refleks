<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ REFLEKS — 15 ta miya o'yini</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#120E24; --panel:#1C1738; --panel-2:#241D48;
    --ink:#F4F1FF; --muted:#8D85B8; --line:#332B5E;
    --danger:#FF4949; --accent:#6C5CE7;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;
    display:flex;flex-direction:column;max-width:520px;margin:0 auto;touch-action:manipulation}
  h1,h2,.display{font-family:'Unbounded',sans-serif}

  /* ---------- PULS CHIZIG'I (imzo element) ---------- */
  .pulse-wrap{height:40px;flex-shrink:0;overflow:hidden;position:relative;opacity:.9}
  .pulse-wrap svg{position:absolute;left:0;top:0;height:40px;width:200%;animation:pulseScroll 6s linear infinite}
  @keyframes pulseScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .pulse-line{fill:none;stroke:var(--accent);stroke-width:2.5;filter:drop-shadow(0 0 6px var(--accent))}
  @media (prefers-reduced-motion:reduce){.pulse-wrap svg{animation:none}*{transition:none!important;animation-duration:.01s!important}}

  /* ---------- EKRANLAR ---------- */
  .screen{flex:1;display:none;flex-direction:column;padding:8px 16px 24px;overflow-y:auto}
  .screen.active{display:flex}

  /* ---------- MENYU ---------- */
  .brand{margin:4px 0 2px}
  .brand h1{font-size:28px;font-weight:900;letter-spacing:1px}
  .brand h1 span{color:var(--accent)}
  .brand p{color:var(--muted);font-size:12px;font-weight:700;margin-top:3px}
  .cat{font-family:'Unbounded';font-size:11px;font-weight:700;color:var(--muted);
    letter-spacing:2px;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
  .cat::after{content:"";flex:1;height:1px;background:var(--line)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:13px 12px;min-height:104px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .12s}
  .card:active{transform:scale(.96)}
  .card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--c)}
  .card .ic{font-size:22px}
  .card .nm{font-family:'Unbounded';font-size:11px;font-weight:700;margin-top:6px;line-height:1.3}
  .card .best{font-size:10px;color:var(--muted);font-weight:700;margin-top:5px}
  .card .best b{color:var(--c)}
  .statsbtn{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px;text-align:center;font-weight:800;color:var(--muted);cursor:pointer;font-size:14px}
  .statsbtn:active{transform:scale(.97)}

  /* ---------- O'YIN ---------- */
  .ghead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;gap:8px}
  .ghead h2{font-size:13px;font-weight:700;color:var(--accent);flex:1;text-align:center}
  .ghead .rnd{font-size:11px;font-weight:800;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:5px 11px;white-space:nowrap}
  .backbtn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:2px 8px 2px 0}
  .arena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;min-height:0}
  .bigmsg{font-family:'Unbounded';font-size:20px;font-weight:700;line-height:1.35}
  .submsg{color:var(--muted);font-size:13px;font-weight:700;max-width:300px;line-height:1.5}
  .tbar{width:100%;height:6px;background:var(--panel);border-radius:99px;overflow:hidden;flex-shrink:0}
  .tbar i{display:block;height:100%;background:var(--accent);border-radius:99px;width:100%}

  /* Tez bos / Go-NoGo maydoni */
  .tapzone{width:100%;flex:1;border-radius:20px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:8px;cursor:pointer;font-family:'Unbounded';font-weight:900;font-size:24px;
    transition:background .1s;border:1px solid var(--line);min-height:200px}
  .tapzone.wait{background:linear-gradient(160deg,#3A1230,#241D48);color:var(--muted)}
  .tapzone.go{background:radial-gradient(circle at 50% 40%,#2FBF64,#178A43);color:#06170C;box-shadow:0 0 60px rgba(53,226,115,.45)}
  .tapzone.nogo{background:radial-gradient(circle at 50% 40%,#E0364A,#8F1A29);color:#FFD9DE;box-shadow:0 0 60px rgba(255,73,73,.4)}
  .tapzone small{font-family:'Manrope';font-size:12px;font-weight:700;opacity:.75}

  /* Panjaralar */
  .egrid{display:grid;gap:9px;width:100%}
  .egrid button{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    font-size:30px;padding:14px 0;cursor:pointer;color:var(--ink);
    font-family:'Unbounded';font-weight:700;transition:transform .08s}
  .egrid button:active{transform:scale(.9)}
  .egrid button.done{opacity:.18;pointer-events:none}
  .cellgrid{display:grid;gap:8px;width:min(78vw,300px);margin:0 auto}
  .cellgrid .cell{aspect-ratio:1;border-radius:12px;background:var(--panel);
    border:1px solid var(--line);cursor:pointer;transition:transform .08s,background .12s;
    display:flex;align-items:center;justify-content:center;font-size:22px}
  .cellgrid .cell:active{transform:scale(.92)}
  .cellgrid .cell.lit{background:var(--accent);box-shadow:0 0 18px var(--accent)}
  .cellgrid .cell.ok{background:#1E7A46}
  .cellgrid .cell.bad{background:#8F1A29}
  .target-emoji{font-size:48px;line-height:1}
  .memnum{font-family:'Unbounded';font-size:40px;font-weight:900;letter-spacing:5px;color:var(--accent);
    text-shadow:0 0 24px var(--accent)}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .opts button{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:15px 6px;color:var(--ink);font-family:'Unbounded';font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px}
  .opts button:active{transform:scale(.95)}

  /* Stroop */
  .stroop-dot{width:90px;height:90px;border-radius:50%;box-shadow:0 0 42px var(--dc);background:var(--dc);
    display:flex;align-items:center;justify-content:center}
  .stroop-word{font-family:'Unbounded';font-size:23px;font-weight:900;letter-spacing:2px}
  .cbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .cbtns button{border:none;border-radius:14px;padding:15px 4px;cursor:pointer;
    font-family:'Unbounded';font-size:13px;font-weight:700;color:#120E24}
  .cbtns button:active{transform:scale(.95)}

  /* Kartalar (juftlik) */
  .cardgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
  .pcard{aspect-ratio:3/4;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform .15s}
  .pcard.open{background:var(--panel);border-color:var(--accent)}
  .pcard.matched{opacity:.25;pointer-events:none}
  .pcard:active{transform:scale(.93)}

  /* 24 o'yini */
  .numchips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .chip{min-width:64px;padding:16px 12px;border-radius:14px;background:var(--panel);
    border:2px solid var(--line);font-family:'Unbounded';font-size:20px;font-weight:900;cursor:pointer;color:var(--ink)}
  .chip.sel{border-color:var(--accent);background:var(--panel-2);box-shadow:0 0 14px var(--accent)}
  .chip.used{display:none}
  .opbtns{display:flex;gap:10px}
  .opbtns button{width:52px;height:52px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--accent);font-family:'Unbounded';font-size:19px;font-weight:900;cursor:pointer}
  .opbtns button.sel{background:var(--accent);color:#120E24}

  /* Dual N-Back */
  .nbletter{font-family:'Unbounded';font-size:38px;font-weight:900;color:var(--accent)}
  .nbbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
  .nbbtns button{border:1px solid var(--line);border-radius:14px;padding:15px 4px;cursor:pointer;
    background:var(--panel);color:var(--ink);font-family:'Unbounded';font-size:12px;font-weight:700}
  .nbbtns button.pressed{background:var(--accent);color:#120E24}

  /* Periferik */
  .fixdot{width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .periph-stage{position:relative;width:100%;flex:1;min-height:230px}
  .periph-stage .fixwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .flashnum{position:absolute;font-family:'Unbounded';font-size:24px;font-weight:900;color:var(--ink)}

  /* ---------- NATIJA ---------- */
  .result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:13px;text-align:center}
  .msval{font-family:'Unbounded';font-weight:900;font-size:56px;line-height:1;color:var(--accent);
    text-shadow:0 0 34px var(--accent)}
  .msval small{font-size:18px;color:var(--muted);text-shadow:none;margin-left:4px}
  .verdict{font-size:15px;font-weight:800}
  .record{background:linear-gradient(90deg,#FFB020,#FF4D8D);-webkit-background-clip:text;
    background-clip:text;color:transparent;font-family:'Unbounded';font-size:13px;font-weight:700}
  .rrow{display:flex;gap:16px;color:var(--muted);font-size:12px;font-weight:700;flex-wrap:wrap;justify-content:center}
  .rrow b{color:var(--ink)}
  .btn{width:100%;border:none;border-radius:16px;padding:15px;cursor:pointer;
    font-family:'Unbounded';font-size:14px;font-weight:700}
  .btn.primary{background:var(--accent);color:#0E0A1F}
  .btn.ghost{background:var(--panel);color:var(--muted);border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}

  /* ---------- STATISTIKA ---------- */
  .stat-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .stat-item{background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:12px 15px;display:flex;justify-content:space-between;align-items:center}
  .stat-item .l{font-weight:800;font-size:13px}
  .stat-item .v{font-family:'Unbounded';font-weight:700;font-size:13px;color:var(--c)}
</style>
</head>
<body>

<div class="pulse-wrap">
  <svg viewBox="0 0 800 40" preserveAspectRatio="none">
    <path class="pulse-line" d="M0 20 H60 L75 20 90 5 105 35 118 20 H200 L215 20 230 9 243 31 256 20 H340 L355 20 368 3 384 37 398 20 H460 L475 20 488 11 500 29 512 20 H600 L615 20 628 7 642 33 655 20 H800
      M800 20 H860 L875 20 890 5 905 35 918 20 H1000 L1015 20 1030 9 1043 31 1056 20 H1140 L1155 20 1168 3 1184 37 1198 20 H1260 L1275 20 1288 11 1300 29 1312 20 H1400 L1415 20 1428 7 1442 33 1455 20 H1600"/>
  </svg>
</div>

<section class="screen active" id="scr-menu">
  <div class="brand">
    <h1>REF<span>LEKS</span></h1>
    <p>15 ta sinov · Nerv signalingiz qancha tez?</p>
  </div>
  <div id="menu-body"></div>
  <div class="statsbtn" onclick="UI.showStats()">📊 Mening natijalarim</div>
</section>

<section class="screen" id="scr-game">
  <div class="ghead">
    <button class="backbtn" onclick="Game.quit()">‹</button>
    <h2 id="g-title"></h2>
    <div class="rnd" id="g-round"></div>
  </div>
  <div class="tbar" id="g-tbar" style="display:none"><i id="g-tfill"></i></div>
  <div class="arena" id="g-arena"></div>
</section>

<section class="screen" id="scr-result">
  <div class="result">
    <div style="font-size:40px" id="r-icon"></div>
    <div class="msval" id="r-val"></div>
    <div class="verdict" id="r-verdict"></div>
    <div class="record" id="r-record" style="display:none">🏅 YANGI SHAXSIY REKORD!</div>
    <div class="rrow" id="r-extra"></div>
    <button class="btn primary" id="r-again">🔄 Yana o'ynash</button>
    <button class="btn ghost" onclick="UI.show('menu')">🏠 Bosh menyu</button>
  </div>
</section>

<section class="screen" id="scr-stats">
  <div class="ghead">
    <button class="backbtn" onclick="UI.show('menu')">‹</button>
    <h2 style="color:var(--ink)">📊 Natijalarim</h2><div></div>
  </div>
  <div class="stat-list" id="stat-list"></div>
</section>

<script>
/* ============ TELEGRAM ============ */
const tg=window.Telegram?.WebApp;
try{tg?.ready();tg?.expand();tg?.setHeaderColor('#120E24');tg?.setBackgroundColor('#120E24');}catch(e){}
function haptic(t){try{
  if(!tg?.HapticFeedback)return;
  if(t==='success')tg.HapticFeedback.notificationOccurred('success');
  else if(t==='error')tg.HapticFeedback.notificationOccurred('error');
  else tg.HapticFeedback.impactOccurred('light');
}catch(e){}}

/* ============ TOVUSH ============ */
let AC=null;
function beep(f=880,d=.08,t='sine',v=.14){try{
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}catch(e){}}
const sndGo=()=>beep(1200,.09,'square',.11);
const sndOk=()=>{beep(880,.07);setTimeout(()=>beep(1320,.09),70)};
const sndNo=()=>beep(180,.2,'sawtooth',.16);
const sndTick=()=>beep(600,.05,'sine',.08);

/* ============ SAQLASH ============ */
const Store={
  mem:{},key:'refleks_v2',
  data:{games:0},
  load(cb){
    try{
      if(tg?.CloudStorage){
        tg.CloudStorage.getItem(this.key,(err,val)=>{
          if(!err&&val){try{this.data={...this.data,...JSON.parse(val)}}catch(e){}}
          else this._local();
          cb&&cb();
        });return;
      }
    }catch(e){}
    this._local();cb&&cb();
  },
  _local(){try{const v=localStorage.getItem(this.key);if(v)this.data={...this.data,...JSON.parse(v)};}
    catch(e){this.data={...this.data,...this.mem};}},
  save(){const s=JSON.stringify(this.data);
    try{tg?.CloudStorage?.setItem(this.key,s,()=>{});}catch(e){}
    try{localStorage.setItem(this.key,s);}catch(e){this.mem=this.data;}},
  submit(game,score,better){
    this.data.games=(this.data.games||0)+1;
    const old=this.data[game];
    const rec=old==null||(better==='min'?score<old:score>old);
    if(rec)this.data[game]=score;
    this.save();return rec;
  }
};

/* ============ O'YINLAR RO'YXATI ============ */
const GAMES={
  /* ⚡ REAKSIYA */
  tap:    {name:'⚡ TEZ BOS',        cat:'reaksiya', icon:'⚡', color:'#35E273', unit:'ms',     better:'min'},
  emoji:  {name:'🎯 EMOJINI TOP',    cat:'reaksiya', icon:'🎯', color:'#FFB020', unit:'ms',     better:'min'},
  ascend: {name:'🔢 TARTIB BILAN',   cat:'reaksiya', icon:'🔢', color:'#2EE6D6', unit:'ms',     better:'min'},
  odd:    {name:'👁 FARQNI TOP',     cat:'reaksiya', icon:'👁', color:'#F2C94C', unit:'ms',     better:'min'},
  gonogo: {name:'🚦 BOS / BOSMA',    cat:'reaksiya', icon:'🚦', color:'#7ED957', unit:'ball',   better:'min'},
  periph: {name:'👀 YON KO\u2018RISH',cat:'reaksiya',icon:'👀', color:'#5EEAD4', unit:'/8',     better:'max'},
  /* 🧠 XOTIRA */
  memory: {name:'🧮 SONNI ESLAB QOL',cat:'xotira',   icon:'🧮', color:'#29B6FF', unit:'daraja', better:'max'},
  pattern:{name:'🧩 NAQSH XOTIRASI', cat:'xotira',   icon:'🧩', color:'#6C8CFF', unit:'daraja', better:'max'},
  seq:    {name:'🔄 KETMA-KETLIK',   cat:'xotira',   icon:'🔄', color:'#A78BFA', unit:'daraja', better:'max'},
  cards:  {name:'🃏 JUFTLIK TOPISH', cat:'xotira',   icon:'🃏', color:'#4FC3F7', unit:'son.',   better:'min'},
  nback:  {name:'🧠 DUAL N-BACK',    cat:'xotira',   icon:'🧠', color:'#8B7CF6', unit:'%',      better:'max'},
  /* 🎓 MIYA */
  stroop: {name:'🌈 STROOP TEST',    cat:'miya',     icon:'🌈', color:'#FF4D8D', unit:'ball',   better:'min'},
  math:   {name:'➕ TEZ HISOB',      cat:'miya',     icon:'➕', color:'#FF7A45', unit:'ball',   better:'min'},
  timeest:{name:'⏱ VAQT SEZGISI',   cat:'miya',     icon:'⏱', color:'#FF5C8A', unit:'ms',     better:'min'},
  game24: {name:'🧮 24 O\u2018YINI', cat:'miya',     icon:'♠️', color:'#FF9F1C', unit:'son.',   better:'min'},
};
const CATS={reaksiya:'⚡ REAKSIYA',xotira:'🧠 XOTIRA',miya:'🎓 MIYA'};
const $=id=>document.getElementById(id);
const rnd=n=>Math.floor(Math.random()*n);
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

/* ============ UI ============ */
const UI={
  buildMenu(){
    let html='';
    for(const c in CATS){
      html+=`<div class="cat">${CATS[c]}</div><div class="cards">`;
      for(const g in GAMES){
        if(GAMES[g].cat!==c)continue;
        html+=`<div class="card" style="--c:${GAMES[g].color}" onclick="Game.start('${g}')">
          <div><div class="ic">${GAMES[g].icon}</div><div class="nm">${GAMES[g].name.replace(/^[^ ]+ /,'')}</div></div>
          <div class="best" id="best-${g}">Rekord: <b>—</b></div></div>`;
      }
      html+='</div>';
    }
    $('menu-body').innerHTML=html;
  },
  show(name){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    $('scr-'+name).classList.add('active');
    if(name==='menu'){document.documentElement.style.setProperty('--accent','#6C5CE7');this.refreshBests();}
    haptic('light');
  },
  refreshBests(){
    for(const g in GAMES){
      const v=Store.data[g],el=$('best-'+g);
      if(el)el.innerHTML='Rekord: <b>'+(v==null?'—':this.fmt(g,v))+'</b>';
    }
  },
  fmt(g,v){
    const u=GAMES[g].unit;
    if(u==='son.')return (v/1000).toFixed(1)+' s';
    if(u==='/8')return v+'/8';
    return v+' '+u;
  },
  showStats(){
    const list=$('stat-list');let html='';
    for(const g in GAMES){
      const v=Store.data[g];
      html+=`<div class="stat-item" style="--c:${GAMES[g].color}">
        <span class="l">${GAMES[g].name}</span>
        <span class="v">${v==null?'—':this.fmt(g,v)}</span></div>`;
    }
    html+=`<div class="stat-item" style="--c:#6C5CE7">
      <span class="l">🎮 Jami o'yinlar</span><span class="v">${Store.data.games||0}</span></div>`;
    list.innerHTML=html;this.show('stats');
  },
  result(game,valText,verdict,isRecord,extraHTML,icon){
    $('r-icon').textContent=icon;
    $('r-val').innerHTML=valText;
    $('r-verdict').textContent=verdict;
    $('r-record').style.display=isRecord?'block':'none';
    $('r-extra').innerHTML=extraHTML||'';
    $('r-again').onclick=()=>Game.start(game);
    this.show('result');
    if(isRecord){haptic('success');sndOk();}
  }
};

/* ============ TAYMER CHIZIG'I ============ */
function runBar(ms){
  const fill=$('g-tfill');
  $('g-tbar').style.display='block';
  fill.style.transition='none';fill.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition=`width ${ms}ms linear`;fill.style.width='0%';
  }));
}
function hideBar(){$('g-tbar').style.display='none';}

/* ============ O'YIN DVIGATELI ============ */
const Game={
  current:null,timers:[],
  clearTimers(){this.timers.forEach(t=>clearTimeout(t));this.timers=[];},
  wait(ms){return new Promise(r=>{this.timers.push(setTimeout(r,ms))})},
  alive(g){return this.current===g;},
  start(game){
    this.clearTimers();hideBar();
    this.current=game;
    document.documentElement.style.setProperty('--accent',GAMES[game].color);
    $('g-title').textContent=GAMES[game].name;
    $('g-round').textContent='';
    UI.show('game');
    this[game]();
  },
  quit(){this.clearTimers();hideBar();this.current=null;UI.show('menu');},

  /* ════════ 1. TEZ BOS ════════ */
  async tap(){
    const ROUNDS=5,times=[];let falseStarts=0;
    const arena=$('g-arena');
    for(let r=1;r<=ROUNDS;r++){
      $('g-round').textContent=r+'/'+ROUNDS;
      let done=false;
      await new Promise(resolve=>{
        arena.innerHTML=`<div class="tapzone wait" id="tz">KUTIB TUR...<small>Yashil bo'lganda bos</small></div>`;
        const tz=$('tz');let goTime=0,state='wait';
        tz.onpointerdown=()=>{
          if(state==='wait'){falseStarts++;haptic('error');sndNo();

  /* ════════ 8. NAQSH XOTIRASI ════════ */
  async pattern(){
    let level=1;
    const arena=$('g-arena');
    while(true){
      const size=level<4?3:level<7?4:5;
      const count=Math.min(level+2,size*size-1);
      $('g-round').textContent=level+'-daraja';
      const cells=shuffle(Array.from({length:size*size},(_,i)=>i)).slice(0,count);
      // Ko'rsatish
      arena.innerHTML=`<div class="submsg">Yonib turgan kataklarni eslab qoling!</div>
        <div class="cellgrid" style="grid-template-columns:repeat(${size},1fr)" id="pg">
        ${Array.from({length:size*size},(_,i)=>`<div class="cell" data-i="${i}"></div>`).join('')}</div>`;
      const grid=$('pg');
      cells.forEach(i=>grid.children[i].classList.add('lit'));
      haptic('light');
      await this.wait(1000+count*280);if(!this.alive('pattern'))return;
      cells.forEach(i=>grid.children[i].classList.remove('lit'));
      // Takrorlash
      const ok=await new Promise(resolve=>{
        let found=0,failed=false;
        arena.querySelector('.submsg').textContent='Endi o\u2018sha kataklarni bosing!';
        grid.querySelectorAll('.cell').forEach(c=>{
          c.onpointerdown=()=>{
            if(failed)return;
            const i=parseInt(c.dataset.i);
            if(cells.includes(i)&&!c.classList.contains('ok')){
              c.classList.add('ok');found++;sndTick();haptic('light');
              if(found===count)resolve(true);
            }else if(!cells.includes(i)){
              c.classList.add('bad');failed=true;
              cells.forEach(x=>grid.children[x].classList.add('lit'));
              resolve(false);
            }
          };
        });
      });
      if(!this.alive('pattern'))return;
      if(ok){level++;haptic('success');sndOk();await this.wait(600);if(!this.alive('pattern'))return;}
      else{haptic('error');sndNo();await this.wait(1400);break;}
    }
    if(!this.alive('pattern'))return;
    const score=level-1;
    const rec=Store.submit('pattern',score,'max');
    const verdict=score>=8?'🧠 Vizual genius!':score>=5?'🔥 Kuchli!':score>=3?'👍 Yaxshi!':'🙂 Mashq qiling!';
    UI.result('pattern',`${score}<small>-daraja</small>`,verdict,rec,'','🧩');
  },

  /* ════════ 11. DUAL N-BACK (n=2) ════════ */
  async nback(){
    const N=2,TRIALS=16,LETTERS=['A','B','K','M','S','T','O','R'];
    const arena=$('g-arena');
    arena.innerHTML=`<div class="bigmsg">🧠 QOIDA (2-back)</div>
      <div class="submsg">Har qadamda katak yonadi va harf chiqadi.<br><br>
      📍 Joy <b>2 qadam oldingi</b> bilan bir xil bo'lsa — «JOY MOS»ni bos.<br>
      🔤 Harf <b>2 qadam oldingi</b> bilan bir xil bo'lsa — «HARF MOS»ni bos.<br><br>
      Ikkalasi ham mos bo'lishi mumkin!</div>`;
    await this.wait(6000);if(!this.alive('nback'))return;
    // Ketma-ketlik: ~30% mosliklar bilan
    const pos=[],let_=[];
    for(let i=0;i<TRIALS;i++){
      if(i>=N&&Math.random()<0.32)pos.push(pos[i-N]);else pos.push(rnd(9));
      if(i>=N&&Math.random()<0.32)let_.push(let_[i-N]);else let_.push(LETTERS[rnd(8)]);
    }
    let correct=0,totalDecisions=0;
    for(let i=0;i<TRIALS;i++){
      $('g-round').textContent=(i+1)+'/'+TRIALS;
      const posMatch=i>=N&&pos[i]===pos[i-N];
      const letMatch=i>=N&&let_[i]===let_[i-N];
      let pPress=false,lPress=false;
      arena.innerHTML=`
        <div class="cellgrid" style="grid-template-columns:repeat(3,1fr)" id="ng">
        ${Array.from({length:9},(_,k)=>`<div class="cell${k===pos[i]?' lit':''}"></div>`).join('')}</div>
        <div class="nbletter">${let_[i]}</div>
        <div class="nbbtns">
          <button id="nb-p">📍 JOY MOS</button>
          <button id="nb-l">🔤 HARF MOS</button>
        </div>`;
      sndTick();haptic('light');
      $('nb-p').onpointerdown=e=>{pPress=true;e.target.classList.add('pressed');};
      $('nb-l').onpointerdown=e=>{lPress=true;e.target.classList.add('pressed');};
      await this.wait(2400);if(!this.alive('nback'))return;
      if(i>=N){
        totalDecisions+=2;
        if(pPress===posMatch)correct++;
        if(lPress===letMatch)correct++;
      }
    }
    const pct=Math.round(correct/totalDecisions*100);
    const rec=Store.submit('nback',pct,'max');
    const verdict=pct>=90?'🧠 Ishchi xotira gigant!':pct>=75?'🔥 Juda yaxshi!':
      pct>=60?'👍 Yaxshi boshlanish!':'🙂 Bu eng qiyin sinov — mashq qiling!';
    UI.result('nback',`${pct}<small>%</small>`,verdict,rec,
      `<span>To'g'ri: <b>${correct}/${totalDecisions}</b></span>`,'🧠');
  },

  /* ════════ 12. STROOP ════════ */
  async stroop(){
    const COLORS={qizil:'#FF4949',kok:'#3D8BFF',yashil:'#35E273',sariq:'#FFD028'};
    const NAMES={qizil:"QIZIL",kok:"KO'K",yashil:"YASHIL",sariq:"SARIQ"};
    const KEYS=Object.keys(COLORS);
    const ROUNDS=8,LIMIT=2500;
    let total=0,errors=0,timeouts=0;
    const arena=$('g-arena');
    for(let r=1;r<=ROUNDS;r++){
      $('g-round').textContent=r+'/'+ROUNDS;
      const word=KEYS[rnd(4)],color=KEYS[rnd(4)];
      const outcome=await new Promise(resolve=>{
        arena.innerHTML=`
          <div class="submsg">So'zga emas — <b style="color:var(--ink)">rangga</b> qarab bosing!</div>
          <div class="stroop-dot" style="--dc:${COLORS[color]}"><span class="stroop-word">${NAMES[word]}</span></div>
          <div class="cbtns">${shuffle(KEYS).map(k=>
            `<button data-k="${k}" style="background:${COLORS[k]}">${NAMES[k]}</button>`).join('')}</div>`;
        const t0=performance.now();
        runBar(LIMIT);
        const to=setTimeout(()=>resolve({type:'timeout'}),LIMIT);
        this.timers.push(to);
        arena.querySelectorAll('.cbtns button').forEach(b=>{
          b.onpointerdown=()=>{clearTimeout(to);
            resolve({type:b.dataset.k===color?'ok':'err',ms:Math.round(performance.now()-t0)});};
        });
      });
      if(!this.alive('stroop'))return;
      if(outcome.type==='ok'){total+=outcome.ms;haptic('light');sndOk();}
      else if(outcome.type==='err'){total+=outcome.ms+300;errors++;haptic('error');sndNo();}
      else{total+=LIMIT;timeouts++;haptic('error');sndNo();}
    }
    hideBar();
    const score=total+errors*300;
    const rec=Store.submit('stroop',score,'min');
    const verdict=errors===0&&timeouts===0?'🏆 Miyangiz aldanmadi!':
      errors+timeouts<=2?'👍 Yaxshi diqqat!':'🙂 So\u2018z sizni aldayapti — mashq qiling!';
    UI.result('stroop',`${score}<small>ball</small>`,verdict,rec,
      `<span>Xato: <b>${errors}</b></span><span>Kechikish: <b>${timeouts}</b></span>`,'🌈');
  },

  /* ════════ 13. TEZ HISOB ════════ */
  async math(){
    const ROUNDS=10,LIMIT=6000;
    let total=0,errors=0;
    const arena=$('g-arena');
    for(let r=1;r<=ROUNDS;r++){
      $('g-round').textContent=r+'/'+ROUNDS;
      // Qiyinlik oshib boradi
      let a,b,op,ans;
      if(r<=3){op=Math.random()<.5?'+':'−';a=rnd(40)+10;b=rnd(30)+5;}
      else if(r<=6){op=['+','−','×'][rnd(3)];a=op==='×'?rnd(9)+3:rnd(70)+20;b=op==='×'?rnd(9)+3:rnd(50)+10;}
      else{op=['+','−','×'][rnd(3)];a=op==='×'?rnd(12)+6:rnd(200)+50;b=op==='×'?rnd(9)+4:rnd(150)+30;}
      if(op==='−'&&b>a)[a,b]=[b,a];
      ans=op==='+'?a+b:op==='−'?a-b:a*b;
      const opts=new Set([ans]);
      while(opts.size<4){
        const d=ans+(rnd(2)?1:-1)*(rnd(Math.max(Math.round(ans*.15),3))+1);
        if(d>=0)opts.add(d);
      }
      const outcome=await new Promise(resolve=>{
        arena.innerHTML=`
          <div class="bigmsg" style="font-size:32px">${a} ${op} ${b} = ?</div>
          <div class="opts">${shuffle([...opts]).map(v=>`<button data-v="${v}">${v}</button>`).join('')}</div>`;
        const t0=performance.now();
        runBar(LIMIT);
        const to=setTimeout(()=>resolve({type:'timeout'}),LIMIT);
        this.timers.push(to);
        arena.querySelectorAll('.opts button').forEach(btn=>{
          btn.onpointerdown=()=>{clearTimeout(to);
            resolve({type:parseInt(btn.dataset.v)===ans?'ok':'err',ms:Math.round(performance.now()-t0)});};
        });
      });
      if(!this.alive('math'))return;
      if(outcome.type==='ok'){total+=outcome.ms;haptic('light');sndOk();}
      else if(outcome.type==='err'){total+=outcome.ms+1500;errors++;haptic('error');sndNo();}
      else{total+=LIMIT+1500;errors++;haptic('error');sndNo();}
    }
    hideBar();
    const score=Math.round(total/100)*100/100; // yumaloqlash
    const finalScore=Math.round(total);
    const rec=Store.submit('math',finalScore,'min');
    const verdict=errors===0&&total<25000?'🧮 Hisob mashinasi!':errors<=1?'🔥 Zo\u2018r!':
      errors<=3?'👍 Yaxshi!':'🙂 Mashq qiling!';
    UI.result('math',`${(finalScore/1000).toFixed(1)}<small>s</small>`,verdict,rec,
      `<span>Xatolar: <b>${errors}</b></span>`,'➕');
  },

  /* ════════ 14. VAQT SEZGISI (5 soniya) ════════ */
  async timeest(){
    const ROUNDS=3,TARGET=5000;
    const devs=[];
    const arena=$('g-arena');
    for(let r=1;r<=ROUNDS;r++){
      $('g-round').textContent=r+'/'+ROUNDS;
      await new Promise(resolve=>{
        arena.innerHTML=`<div class="bigmsg">⏱ ${TARGET/1000} SONIYA</div>
          <div class="submsg">Tugmani bosing, ichingizda roppa-rosa ${TARGET/1000} soniya sanang va yana bosing.<br>Sekundomer ko'rinmaydi!</div>
          <div class="tapzone wait" id="tz" style="flex:0;min-height:150px">BOSHLASH<small>bosing</small></div>`;
        const tz=$('tz');let t0=0,started=false;
        tz.onpointerdown=()=>{
          if(!started){
            started=true;t0=performance.now();
            haptic('light');sndTick();
            tz.classList.remove('wait');
            tz.style.background='var(--panel-2)';
            tz.style.color='var(--accent)';
            tz.innerHTML=`SANANG...<small>${TARGET/1000} soniyadan keyin bosing</small>`;
          }else{
            const elapsed=performance.now()-t0;
            const dev=Math.round(Math.abs(elapsed-TARGET));
            devs.push(dev);
            haptic('light');
            tz.innerHTML=`${(elapsed/1000).toFixed(2)} s<small>farq: ${dev} ms</small>`;
            this.timers.push(setTimeout(resolve,1300));
          }
        };
      });
      if(!this.alive('timeest'))return;
    }
    const avg=Math.round(devs.reduce((a,b)=>a+b,0)/devs.length);
    const rec=Store.submit('timeest',avg,'min');
    const verdict=avg<150?'⏰ Ichki soatingiz shveytsariyacha aniq!':avg<350?'🔥 Juda yaxshi sezgi!':
      avg<700?'👍 Yaxshi!':'🙂 Ichki ritmni mashq qiling!';
    UI.result('timeest',`±${avg}<small>ms</small>`,verdict,rec,
      `<span>Eng aniq: <b>±${Math.min(...devs)} ms</b></span>`,'⏱');
  },

  /* ════════ 15. 24 O'YINI ════════ */
  async game24(){
    // Yechimga ega ekani matematik tekshirilgan to'plamlar
    const PUZZLES=[[1,1,2,7],[1,1,2,9],[1,1,3,7],[1,1,4,6],[1,1,6,8],[1,2,2,4],[1,2,3,3],[1,2,4,4],
      [1,2,4,5],[1,2,4,6],[1,2,5,9],[1,3,5,8],[1,3,6,7],[1,4,6,9],[1,5,6,6],[2,2,2,7],[2,2,4,4],
      [2,2,4,5],[2,2,4,7],[2,3,4,7],[2,3,4,9],[2,3,5,9],[2,3,8,9],[2,3,9,9],[2,4,4,6],[2,4,4,9],
      [2,4,5,6],[2,4,5,7],[2,4,5,9],[2,4,8,9],[2,5,6,7],[2,5,6,9],[2,7,8,9],[3,3,8,9],[3,4,5,6],
      [3,4,5,9],[3,4,6,6],[3,4,7,8],[3,4,8,9],[3,5,7,8],[3,6,9,9],[4,5,6,9],[4,5,7,8],[4,5,7,9],
      [4,5,9,9],[4,6,7,7],[4,6,7,8],[5,6,7,8],[6,8,8,9]];
    const puzzle=PUZZLES[rnd(PUZZLES.length)];
    const arena=$('g-arena');
    const t0=performance.now();
    let nums=shuffle(puzzle).map((v,i)=>({id:i,val:v}));
    let selNum=null,selOp=null;
    const OPS={'+':(a,b)=>a+b,'−':(a,b)=>a-b,'×':(a,b)=>a*b,'÷':(a,b)=>b===0?null:a/b};
    const fmt=v=>Number.isInteger(v)?v:+v.toFixed(2);

    const render=()=>{
      $('g-round').textContent=nums.length+' ta son';
      arena.innerHTML=`
        <div class="submsg">To'rttala sondan foydalanib <b style="color:var(--accent)">24</b> hosil qiling.<br>
        Son → amal → son tartibida bosing.</div>
        <div class="numchips">${nums.map(n=>
          `<button class="chip${selNum===n.id?' sel':''}" data-id="${n.id}">${fmt(n.val)}</button>`).join('')}</div>
        <div class="opbtns">${Object.keys(OPS).map(o=>
          `<button class="${selOp===o?'sel':''}" data-op="${o}">${o}</button>`).join('')}</div>
        <button class="btn ghost" id="resetbtn" style="max-width:200px">↺ Qaytadan</button>`;
      arena.querySelectorAll('.chip').forEach(b=>{
        b.onpointerdown=()=>{
          const id=parseInt(b.dataset.id);
          haptic('light');sndTick();
          if(selNum===null){selNum=id;}
          else if(selNum===id){selNum=null;}
          else if(selOp){
            const a=nums.find(n=>n.id===selNum),c=nums.find(n=>n.id===id);
            const res=OPS[selOp](a.val,c.val);
            if(res===null){haptic('error');sndNo();selOp=null;render();return;}
            nums=nums.filter(n=>n.id!==selNum&&n.id!==id);
            const nid=Math.max(0,...nums.map(n=>n.id))+1+rnd(1000);
            nums.push({id:nid,val:res});
            selNum=null;selOp=null;
            if(nums.length===1)return finish(nums[0].val);
          }else{selNum=id;}
          render();
        };
      });
      arena.querySelectorAll('.opbtns button').forEach(b=>{
        b.onpointerdown=()=>{selOp=selOp===b.dataset.op?null:b.dataset.op;haptic('light');render();};
      });
      $('resetbtn').onpointerdown=()=>{
        nums=shuffle(puzzle).map((v,i)=>({id:i,val:v}));
        selNum=null;selOp=null;haptic('light');render();
      };
    };

    const finish=(val)=>{
      if(!this.alive('game24'))return;
      if(Math.abs(val-24)<1e-6){
        const total=Math.round(performance.now()-t0);
        const rec=Store.submit('game24',total,'min');
        const verdict=total<20000?'🧮 Matematik daho!':total<45000?'🔥 Zo\u2018r!':
          total<90000?'👍 Yaxshi!':'🙂 Topdingiz — bu asosiysi!';
        UI.result('game24',`${(total/1000).toFixed(1)}<small>s</small>`,verdict,rec,
          `<span>Sonlar: <b>${puzzle.join(', ')}</b></span>`,'♠️');
      }else{
        haptic('error');sndNo();
        arena.innerHTML=`<div class="bigmsg" style="color:var(--danger)">Natija: ${fmt(val)} ≠ 24</div>
          <div class="submsg">Qaytadan urinib ko'ring!</div>
          <button class="btn primary" id="retry" style="max-width:220px">↺ Qaytadan</button>`;
        $('retry').onpointerdown=()=>{
          nums=shuffle(puzzle).map((v,i)=>({id:i,val:v}));
          selNum=null;selOp=null;render();
        };
      }
    };
    render();
  },
};

/* ============ ISHGA TUSHISH ============ */
UI.buildMenu();
Store.load(()=>UI.refreshBests());
</script>
